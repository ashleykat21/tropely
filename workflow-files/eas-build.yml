name: EAS Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        default: "all"
        type: choice
        options: [all, android, ios]
      profile:
        description: "Build profile"
        required: true
        default: "production"
        type: choice
        options: [production, preview, development]
  push:
    branches: [main]
    paths:
      - "artifacts/tropely-mobile/**"
      - "lib/**"
      - "pnpm-lock.yaml"

jobs:
  build:
    name: EAS Build (${{ github.event.inputs.platform || 'all' }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with EAS
        working-directory: artifacts/tropely-mobile
        run: |
          npx eas-cli build \
            --platform ${{ github.event.inputs.platform || 'all' }} \
            --profile ${{ github.event.inputs.profile || 'production' }} \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
