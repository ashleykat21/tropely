workflows:
  ios-preview:
    name: Tropely iOS Preview
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      groups:
        - tropely
      xcode: 16.4
      vars:
        BUNDLE_ID: com.nevora.tropely
        NODE: 20.17.0
    working_directory: artifacts/tropely-mobile
    scripts:
      - name: Install pnpm
        script: npm install -g pnpm@10.26.1 --force

      - name: Install dependencies
        script: cd ../.. && pnpm install --no-frozen-lockfile

      - name: Set up .env
        script: |
          echo "EXPO_PUBLIC_SUPABASE_URL=$EXPO_PUBLIC_SUPABASE_URL" > .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=$EXPO_PUBLIC_SUPABASE_ANON_KEY" >> .env
          echo "EXPO_PUBLIC_MIXPANEL_TOKEN=$EXPO_PUBLIC_MIXPANEL_TOKEN" >> .env

      - name: Expo prebuild
        script: |
          UPDATED_BUILD_NUMBER=$(($BUILD_NUMBER + 15))
          echo "Setting iOS Build Number to: $UPDATED_BUILD_NUMBER"
          EXPO_PUBLIC_SUPABASE_URL=$EXPO_PUBLIC_SUPABASE_URL \
          EXPO_PUBLIC_SUPABASE_ANON_KEY=$EXPO_PUBLIC_SUPABASE_ANON_KEY \
          EXPO_PUBLIC_MIXPANEL_TOKEN=$EXPO_PUBLIC_MIXPANEL_TOKEN \
          pnpm exec expo prebuild --platform ios --non-interactive
          cd ios && plutil -replace CFBundleVersion -string "$UPDATED_BUILD_NUMBER" tropely/Info.plist

      - name: Patch Podfile
        script: |
          python3 << 'PYEOF'
          with open('ios/Podfile', 'r') as f:
              content = f.read()

          print("=== BEFORE PATCH ===")
          print(content[:500])

          if 'use_modular_headers!' not in content:
              content = content.replace(
                  'platform :ios',
                  "use_modular_headers!\nplatform :ios",
                  1
              )

          patch = """
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['CLANG_CXX_LANGUAGE_STANDARD'] = 'c++17'
                config.build_settings['CLANG_CXX_LIBRARY'] = 'libc++'
              end
            end
          """

          if 'post_install do |installer|' in content:
              content = content.replace(
                  'post_install do |installer|',
                  'post_install do |installer|\n' + patch,
                  1
              )
          else:
              content += '\npost_install do |installer|\n' + patch + '\nend\n'

          with open('ios/Podfile', 'w') as f:
              f.write(content)

          print("=== AFTER PATCH ===")
          with open('ios/Podfile', 'r') as f:
              print(f.read()[:500])

          print("Podfile patched successfully")
          PYEOF

      - name: Install CocoaPods
        script: cd ios && pod install

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch signing files
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key "$CERTIFICATE_PRIVATE_KEY"

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace ios/Tropely.xcworkspace \
            --scheme Tropely

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
