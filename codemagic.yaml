workflows:
  ios-preview:
    name: Tropely iOS Preview
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.nevora.tropely
      vars:
        EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_live_Y2xlcmsudXNlbmV2b3JhLmNvbSQ
      node: 20.17.0
    working_directory: artifacts/tropely-mobile
    scripts:
      - name: Install pnpm
        script: npm install -g pnpm@10.26.1
      - name: Install dependencies
        script: cd ../.. && pnpm install --no-frozen-lockfile
      - name: Set up .env
        script: echo "EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY=$EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY" > .env
      - name: Expo prebuild
        script: pnpm exec expo prebuild --platform ios --non-interactive
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace ios/Tropely.xcworkspace \
            --scheme Tropely
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
