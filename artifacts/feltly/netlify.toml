[build]
  command = "pnpm install --frozen-lockfile && pnpm --filter @workspace/feltly run build"
  publish = "artifacts/feltly/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"

# Proxy all /api/* requests to Railway backend.
# After deploying to Railway, replace the URL below with your Railway app URL.
[[redirects]]
  from = "/api/*"
  to = "https://REPLACE_WITH_YOUR_RAILWAY_URL/api/:splat"
  status = 200
  force = true

# SPA fallback — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
