kind = "mobile"
previewPath = "/mobile/"
title = "Tropely Mobile"
version = "1.0.0"
id = "artifacts/tropely-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 24021

[services.development]
run = "pnpm --filter @workspace/tropely-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tropely-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/tropely-mobile", "run", "serve" ]

[services.env]
PORT = "24021"
BASE_PATH = "/mobile/"
