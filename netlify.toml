[build]
  base = "."
  command = "npm install --prefix artifacts/feltly --legacy-peer-deps --ignore-scripts && npm run build --prefix artifacts/feltly"
  publish = "artifacts/feltly/dist"

[build.environment]
  NODE_VERSION = "24"
  HUSKY = "0"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
